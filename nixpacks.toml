[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput"]

[phases.migrate]
cmds = ["python manage.py migrate --noinput"]
dependsOn = ["install"]

[start]
cmd = "gunicorn config.wsgi --log-file -"
